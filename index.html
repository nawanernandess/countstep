<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link
      rel="icon"
      href="./assets/icons/contagem.png"
      type="image/x-icon"
    />
    <title>CountStep: contagem simplificada.</title>
  </head>
  <body>
    <div class="container">
      <div class="content">
        <header>
          <h1>CountStep</h1>
          <p>Contagem simples, resultados precisos</p>
        </header>

        <form id="counter-form" class="input-data">
          <div class="input-group">
            <div class="input-field">
              <label for="start">Inicio:</label>
              <input
                type="number"
                name="start"
                id="start"
                class="input-style"
              />
            </div>

            <div class="input-field">
              <label for="end">Fim:</label>
              <input type="number" name="end" id="end" class="input-style" />
            </div>

            <div class="input-field">
              <label for="step">Salto:</label>
              <input type="number" name="step" id="step" class="input-style" />
            </div>
          </div>

          <button type="submit" class="counter-result-btn">Contar</button>
        </form>

        <section id="result" class="result">Preparando a contagem...</section>
      </div>
    </div>

    <script src="index.js"></script>
  </body>
</html>
